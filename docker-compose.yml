version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: nextgen_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - nextgen_network

  livekit-server:
    image: livekit/livekit-server:latest
    container_name: nextgen_livekit
    restart: unless-stopped
    # ⚠️ QUAN TRỌNG: Bạn thay CHINH_XAC_IP_PUBLIC_CUA_BAN bằng IP thật của VPS. 
    # TUYỆT ĐỐI KHÔNG điền 10.0.1.9. Nếu không thay đúng, phòng họp sẽ bị màn hình đen.
    command: --config /etc/livekit.yaml --node-ip 194.233.84.253
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    ports:
      - "7881:7881/tcp"
      - "7882:7882/udp"
      - "50000-50050:50000-50050/udp"
    depends_on:
      - redis
    networks:
      - nextgen_network

  livekit-egress:
    image: livekit/egress:latest
    container_name: nextgen_egress
    restart: unless-stopped
    environment:
      - EGRESS_REDIS_ADDRESS=redis:6379 
      # Key đã được tạo sẵn cố định
      - EGRESS_API_KEY=API_nextgen_admin_key
      - EGRESS_API_SECRET=SEC_thanhnguyen_group_super_secure_9999
      - EGRESS_WS_URL=ws://livekit-server:7880
    depends_on:
      - livekit-server
      - redis
    networks:
      - nextgen_network

volumes:
  redis_data:

networks:
  nextgen_network:
    driver: bridge
