version: '3.8'

services:
  redis:
    image: 'redis:7-alpine'
    container_name: nextgen_redis
    restart: unless-stopped
    # ÉP REDIS CHẠY CỔNG 6380 VÀ TẮT MẬT KHẨU
    command: redis-server --port 6380 --protected-mode no --save 60 1 --loglevel warning
    network_mode: host

  livekit-server:
    build:
      context: .
      dockerfile: Dockerfile.livekit
    container_name: nextgen_livekit
    restart: unless-stopped
    network_mode: host
    depends_on:
      - redis
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.routers.livekit-server.rule=Host(`livekit.thanhnguyen.group`)"
      - "traefik.http.routers.livekit-server.entrypoints=https"
      - "traefik.http.routers.livekit-server.tls=true"
      - "traefik.http.routers.livekit-server.tls.certresolver=letsencrypt"
      - "traefik.http.services.livekit-server.loadbalancer.server.port=7880"
      - "traefik.http.middlewares.livekit-cors.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST,DELETE"
      - "traefik.http.middlewares.livekit-cors.headers.accesscontrolalloworiginlist=https://meet.thanhnguyen.group"
      - "traefik.http.middlewares.livekit-cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.livekit-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.routers.livekit-server.middlewares=livekit-cors"
