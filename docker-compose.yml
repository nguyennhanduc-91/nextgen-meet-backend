version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: nextgen_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - nextgen_network

  livekit-server:
    image: livekit/livekit-server:latest
    container_name: nextgen_livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml --node-ip 194.233.84.253
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro 
    ports:
      - "7881:7881/tcp"
      - "7882:7882/udp"
      - "50000-50050:50000-50050/udp"
    depends_on:
      - redis
    networks:
      - nextgen_network

  livekit-egress:
    image: livekit/egress:latest
    container_name: nextgen_egress
    restart: unless-stopped
    environment:
      # Truyền thẳng nguyên khối YAML vào biến môi trường này. 
      # Dấu "|" ở dưới để giữ đúng định dạng xuống dòng của YAML.
      EGRESS_CONFIG: |
        api_key: "API_nextgen_admin_key"
        api_secret: "SEC_thanhnguyen_group_super_secure_9999"
        ws_url: "ws://livekit-server:7880"
        redis:
          address: "redis:6379"
    depends_on:
      - livekit-server
      - redis
    networks:
      - nextgen_network

volumes:
  redis_data:

networks:
  nextgen_network:
    driver: bridge
