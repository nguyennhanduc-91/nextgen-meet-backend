version: '3.8'

services:
  # Redis: Quản lý trạng thái, đồng bộ hóa các luồng và cần thiết cho tính năng Egress (Ghi hình)
  redis:
    image: redis:7-alpine
    container_name: nextgen_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - nextgen_network

  # LiveKit Server: Lõi xử lý WebRTC (Video/Audio)
  livekit-server:
    image: livekit/livekit-server:latest
    container_name: nextgen_livekit
    restart: unless-stopped
    # LƯU Ý QUAN TRỌNG: Bạn PHẢI thay YOUR_VPS_PUBLIC_IP bằng địa chỉ IP thật của VPS
    # Ví dụ: command: --config /etc/livekit.yaml --node-ip 103.11.22.33
    command: --config /etc/livekit.yaml --node-ip YOUR_VPS_PUBLIC_IP
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    ports:
      # Expose trực tiếp các port này ra môi trường Host, Coolify proxy sẽ không can thiệp vào các port này
      - "7881:7881/tcp"
      - "7882:7882/udp"
      - "50000-50050:50000-50050/udp"
    depends_on:
      - redis
    networks:
      - nextgen_network

  # LiveKit Egress: Module xử lý ghi hình, xuất video mp4 hoặc livestream RTMP
  livekit-egress:
    image: livekit/egress:latest
    container_name: nextgen_egress
    restart: unless-stopped
    environment:
      # Kết nối tới redis qua tên service trong Docker network
      - EGRESS_REDIS_ADDRESS=redis:6379 
      # Phải khớp 100% với file livekit.yaml
      - EGRESS_API_KEY=apikey_nextgen_admin
      - EGRESS_API_SECRET=secret_thanhnguyen_group_super_secure_key_2026
      # Trỏ WS về port mặc định của livekit-server
      - EGRESS_WS_URL=ws://livekit-server:7880
    depends_on:
      - livekit-server
      - redis
    networks:
      - nextgen_network

volumes:
  redis_data:

networks:
  nextgen_network:
    driver: bridge
```
