version: "3.9"

services:
  # =================================================================
  # LÕI TRUYỀN TẢI VIDEO (LIVEKIT SERVER)
  # Đã loại bỏ hoàn toàn Redis nội bộ, chuyển sang dùng Dragonfly
  # =================================================================
  livekit-server:
    image: livekit/livekit-server:latest
    # Dùng bash để tự động sinh file cấu hình livekit.yaml siêu sạch
    command: >
      sh -c "cat <<EOF > /livekit.yaml
      port: 7880
      rtc:
        tcp_port: 7881
        port_range_start: 50000
        port_range_end: 60000
        use_external_ip: true
      redis:
        address: '194.233.84.253:6379'
        password: 'fE0RUoc9Y7vvUReP2bgoNgN7mwYMZ3fILM1vRGLo1kzwJOKOLT5V0ovdY3jY8v8c'
        db: 0
      keys:
        API_nextgen_admin_key: SEC_thanhnguyen_group_super_secure_9999
      EOF
      /livekit-server --config /livekit.yaml"
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-60000:50000-60000/udp"
    restart: unless-stopped

# Khối 'services' hiện tại chỉ còn duy nhất livekit-server. 
# Hoàn toàn không còn bất kỳ dấu vết nào của redis cũ.
