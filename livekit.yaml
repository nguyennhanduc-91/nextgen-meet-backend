port: 7880
bind_addresses:
  - ""
rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: true
  port_range_start: 50000
  port_range_end: 50050
  # Thêm tối ưu mạng RTC
  enable_loopback_candidate: true

# THÊM CẤU HÌNH VIDEO ĐỂ ÉP CHẤT LƯỢNG CAO NHẤT
video:
  dynacast: true # Tự động tắt/bật luồng video mượt mà khi người dùng cuộn khỏi màn hình
  max_bitrate: 3500000 # Tối đa ~3.5Mbps cho mỗi người (Rất nét, Full HD)

redis:
  address: 127.0.0.1:6380 # Đã đổi cổng như bài trước
  username: ""
  password: "" 
  db: 0
keys:
  API_nextgen_admin_key: "SEC_thanhnguyen_group_super_secure_9999"
room:
  empty_timeout: 300
  max_participants: 1000
logging:
  json: false
  level: info
